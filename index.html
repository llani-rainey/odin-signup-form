<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin: Signup form</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <main>
        <section class="sidebar">
            <div class="logo-banner">
                <img src="odin-lined.png" alt="Odin Logo">
                <h1>ODIN</h1>
            </div>
        </section> 
        <section class="content-area">
            <header>
                <p>This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sign up <em>now</em> to get started.
                </p>
                <p>You <em>know</em> you want to.
                </p>
            </header>
            <form id="signup-form" action="">
                <div class="form-title">
                    <h2>Let's do this!</h2>
                </div>
                <div class="input-group">
                    <label for="first_name">FIRST NAME</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>
                <div class="input-group">
                    <label for="last_name">LAST NAME</label>    
                    <input type="text" id="last_name" name="last_name" required>
                </div>
                <div class="input-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="phone">PHONE</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="confirm_password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
            </form>
            <footer>
                <button type="submit" form="signup-form">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </footer>
        </section>
    </main>
</body>
</html>

main>(section.sidebar)+(section.content-area>(header+form> (.input-group*6>label+input)+button)+footer)
